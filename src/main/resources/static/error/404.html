<!DOCTYPE html>
<html lang="en">
<head>
    <title>Link Not Found</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #ff6b6b; }
        a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>Oops! 404</h1>
    <p>We couldn't find that short link. It might have expired or been typed incorrectly.</p>
    <p><a href="/">Go make a new link</a></p>
</div>
</body>
</html>
